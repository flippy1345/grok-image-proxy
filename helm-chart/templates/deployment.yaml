apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy.fullname" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "proxy.configChecksum" . | nindent 8 }}
      labels:
        {{- include "proxy.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          command: ["bun"]
          args: ["run", "/app/index.ts"]
          ports:
            - name: http
              containerPort: {{ .Values.proxy.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.proxy.port | quote }}
            - name: GROK_BASE_URL
              value: {{ .Values.proxy.grokBaseUrl | quote }}
            {{- if .Values.proxy.chatBaseUrl }}
            - name: CHAT_BASE_URL
              value: {{ .Values.proxy.chatBaseUrl | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.proxy.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-code
          configMap:
            name: {{ include "proxy.fullname" . }}
        - name: tmp
          emptyDir: {}
