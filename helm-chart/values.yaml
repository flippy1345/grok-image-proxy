proxy:
  replicaCount: 1

  image:
    repository: oven/bun
    tag: "1.3"
    pullPolicy: IfNotPresent

  port: 8080
  grokBaseUrl: "https://api.x.ai/v1"
  chatBaseUrl: "https://api.deepseek.com"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      traefik.ingress.kubernetes.io/router.middlewares: default-redirect-chain@kubernetescrd
    hosts:
      - grokproxy.nightchicken.de
    tls:
      enabled: true
